name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python files
        run: python -m py_compile scripts/*.py tests/*.py

      - name: CLI smoke test
        run: |
          python scripts/recall.py --version > /dev/null
          python scripts/read_session.py --help > /dev/null

      - name: Run unit tests
        run: python -m unittest -q
